services:
  - type: web
    name: recoverai-bridgeai
    runtime: docker
    plan: free
    envVars:
      - key: PORT
        value: 3002
      - key: NODE_ENV
        value: production
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: VAPI_API_KEY
        sync: false
      - key: VAPI_PRIVATE_KEY
        sync: false
      - key: BREVO_API_KEY
        sync: false
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_PHONE_NUMBER
        sync: false
      - key: WEBHOOK_SECRET
        value: bridgeai-recoverai-2026
